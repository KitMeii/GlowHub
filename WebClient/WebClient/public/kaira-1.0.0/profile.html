<section
  class="padding-large"
  style="background-color: #fafafa; min-height: 80vh"
>
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-3">
        <div class="bg-white p-4 shadow-sm rounded-3 border">
          <div class="text-center mb-4">
            <div
              id="p-avatar"
              class="rounded-circle mx-auto d-flex align-items-center justify-content-center text-white fw-bold mb-2"
              style="
                width: 70px;
                height: 70px;
                background-color: #f759ab;
                font-size: 24px;
              "
            >
              K
            </div>
            <h5 id="p-name" class="brand-name fw-bold m-0">Tuan Kiet</h5>
            <p id="p-email" class="text-muted small">kiet.mta@gmail.com</p>
          </div>

          <div
            class="nav flex-column nav-pills custom-profile-nav"
            id="v-pills-tab"
            role="tablist"
          >
            <button
              class="nav-link active py-3 text-start mb-2 border-0"
              data-bs-toggle="pill"
              data-bs-target="#tab-cart"
            >
              <svg width="20" height="20" class="me-2">
                <use xlink:href="#cart"></use>
              </svg>
              Giỏ hàng của tôi
            </button>
            <button
              class="nav-link py-3 text-start mb-2 border-0"
              data-bs-toggle="pill"
              data-bs-target="#tab-orders"
            >
              <svg width="20" height="20" class="me-2">
                <use xlink:href="#bag"></use>
              </svg>
              Đơn hàng đã đặt
            </button>
            <button
              class="nav-link py-3 text-start text-danger border-0"
              onclick="Auth.logout()"
            >
              <svg width="20" height="20" class="me-2" style="fill: red">
                <use xlink:href="#user"></use>
              </svg>
              Đăng xuất
            </button>
          </div>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="tab-content">
          <div class="tab-pane fade show active" id="tab-cart">
            <div class="bg-white p-4 shadow-sm rounded-3 border">
              <h4 class="brand-name mb-4">Giỏ hàng hiện tại</h4>
              <div id="cart-page-list"></div>

              <div
                id="cart-footer-area"
                class="mt-4 pt-4 border-top d-flex justify-content-between align-items-center"
              >
                <div>
                  <p class="text-muted m-0">Tổng tiền thanh toán:</p>
                  <h3
                    id="cart-page-total"
                    class="text-primary fw-bold m-0"
                    style="color: #f759ab !important"
                  >
                    0₫
                  </h3>
                </div>
                <a
                  href="checkout.html"
                  class="btn btn-dark btn-lg px-5 py-3 text-uppercase fs-6 shadow-sm"
                  style="
                    background-color: #111;
                    border: none;
                    letter-spacing: 1px;
                  "
                >
                  Thanh toán ngay
                </a>
              </div>
            </div>
          </div>

          <div class="tab-pane fade" id="tab-orders">
            <div class="bg-white p-4 shadow-sm rounded-3 border">
              <h4 class="brand-name mb-4">Lịch sử mua hàng</h4>
              <div id="order-list-content">
                <p class="text-muted text-center py-5">
                  Bạn chưa có đơn hàng nào.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
